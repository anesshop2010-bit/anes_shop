<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANES SHOP - تسجيل الدخول</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0088ff,#00d4ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:10px;
}

h2{
    color:#0088ff;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#0088ff;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="login-box">

<img src="download/anesshop.png" class="logo">

<h2>🔐 ANES SHOP</h2>

<input type="text" id="user" placeholder="اسم المستخدم">

<input type="password" id="pass" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<a href="register.html">📝 إنشاء حساب جديد</a>

</div>

<script>
function login(){
    if(
        document.getElementById("user").value==="admin" &&
        document.getElementById("pass").value==="1234"
    ){
        window.location.href="index.html";
    }else{
        alert("❌ بيانات الدخول غير صحيحة");
    }
}
</script>

</body>
</html>
